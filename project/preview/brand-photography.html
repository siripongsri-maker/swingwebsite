<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photography</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .ph {
    aspect-ratio: 1 / 1;
    border-radius: 12px;
    overflow: hidden;
    background: var(--ink-100);
    position: relative;
  }
  .ph img { width: 100%; height: 100%; object-fit: cover; }
  .caption { font-family: var(--font-body); font-size: 11px; color: var(--fg-3); margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="row">
    <div class="ph"><img src="../assets/photo-clinic.jpg" alt=""></div>
    <div class="ph"><img src="../assets/photo-rights.jpg" alt=""></div>
    <div class="ph"><img src="../assets/ed2.webp" alt=""></div>
    <div class="ph"><img src="../assets/hr4.webp" alt=""></div>
  </div>
  <div class="caption">
    Naturalistic, community-photographed. Mobile clinics, classroom shots, advocacy events. No filters; honest skin tones; warmth comes from the moment, not the grade.
  </div>
</body>
</html>

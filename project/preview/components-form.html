<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    color: var(--swing-purple);
  }
  input, select, textarea {
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--fg-1);
    background: white;
    border: 1.5px solid var(--ink-100);
    border-radius: 10px;
    padding: 10px 14px;
    outline: none;
    transition: border-color var(--t-fast) var(--ease-out), box-shadow var(--t-fast) var(--ease-out);
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--swing-pink);
    box-shadow: 0 0 0 3px rgba(230,59,140,0.18);
  }
  input::placeholder { color: var(--ink-300); }
  .check { display: flex; align-items: center; gap: 8px; font-family: var(--font-body); font-size: 14px; color: var(--fg-1); }
  .check input { width: 16px; height: 16px; accent-color: var(--swing-pink); }
  .hint { font-family: var(--font-body); font-size: 11px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="grid">
    <div class="field">
      <label>First name · ชื่อ</label>
      <input value="Nong">
    </div>
    <div class="field">
      <label>Phone · เบอร์โทร</label>
      <input value="02-632-9502" style="border-color: var(--swing-pink); box-shadow: 0 0 0 3px rgba(230,59,140,0.18);">
    </div>
    <div class="field">
      <label>Service requested</label>
      <select>
        <option>HIV · Syphilis screening</option>
        <option>PrEP consultation</option>
        <option>Hormone level testing</option>
      </select>
    </div>
    <div class="field">
      <label>Preferred date</label>
      <input type="date" value="2026-06-15">
    </div>
  </div>
  <div style="margin-top: 14px;">
    <div class="check"><input type="checkbox" checked> I consent to anonymized data being used for SWING's annual report.</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .name { font-family: var(--font-mono); font-size: 11px; width: 56px; color: var(--fg-3); }
  .bar { background: var(--swing-pink); height: 14px; border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="row"><div class="name">--s-1</div><div class="bar" style="width: 4px"></div><div class="px">4</div></div>
  <div class="row"><div class="name">--s-2</div><div class="bar" style="width: 8px"></div><div class="px">8</div></div>
  <div class="row"><div class="name">--s-3</div><div class="bar" style="width: 12px"></div><div class="px">12</div></div>
  <div class="row"><div class="name">--s-4</div><div class="bar" style="width: 16px"></div><div class="px">16</div></div>
  <div class="row"><div class="name">--s-5</div><div class="bar" style="width: 24px"></div><div class="px">24</div></div>
  <div class="row"><div class="name">--s-6</div><div class="bar" style="width: 32px"></div><div class="px">32</div></div>
  <div class="row"><div class="name">--s-7</div><div class="bar" style="width: 48px"></div><div class="px">48</div></div>
  <div class="row"><div class="name">--s-8</div><div class="bar" style="width: 64px"></div><div class="px">64</div></div>
  <div class="row"><div class="name">--s-9</div><div class="bar" style="width: 96px"></div><div class="px">96</div></div>
</body>
</html>

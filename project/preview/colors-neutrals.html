<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .sw {
    border-radius: var(--r-md);
    aspect-ratio: 1 / 1.4;
    padding: 8px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 1px solid var(--ink-100);
    font-family: var(--font-mono);
    font-size: 10px;
  }
  .sw .name { font-family: var(--font-display); font-weight: 600; font-size: 11px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#1A1626;color:#fff;border-color:transparent"><div class="name">ink-900</div>1A1626</div>
    <div class="sw" style="background:#3D3552;color:#fff;border-color:transparent"><div class="name">ink-700</div>3D3552</div>
    <div class="sw" style="background:#6B6480;color:#fff;border-color:transparent"><div class="name">ink-500</div>6B6480</div>
    <div class="sw" style="background:#B5B0C2;color:#1A1626"><div class="name">ink-300</div>B5B0C2</div>
    <div class="sw" style="background:#E8E5EF;color:#3D3552"><div class="name">ink-100</div>E8E5EF</div>
    <div class="sw" style="background:#F3F0F7;color:#3D3552"><div class="name">paper-3</div>F3F0F7</div>
    <div class="sw" style="background:#FAF8FC;color:#3D3552"><div class="name">paper-2</div>FAF8FC</div>
  </div>
</body>
</html>

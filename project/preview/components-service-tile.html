<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Service tile</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .tile {
    background: white;
    border: 1px solid var(--ink-100);
    border-radius: 16px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    transition: box-shadow var(--t-med) var(--ease-out), transform var(--t-med) var(--ease-out);
  }
  .tile:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .tile .ico {
    width: 64px; height: 64px;
    border-radius: 999px;
    background: var(--swing-purple-soft);
    overflow: hidden;
  }
  .tile .ico img { width: 100%; height: 100%; object-fit: cover; }
  .tile h3 {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    color: var(--swing-purple-deep);
    line-height: 1.3;
  }
  .tile p {
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--fg-2);
    line-height: 1.45;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile">
      <div class="ico"><img src="../assets/asset-35.png" alt=""></div>
      <h3>Mobile outreach clinic</h3>
      <p>Bringing testing and PrEP to bars, parks, and community spaces across Bangkok.</p>
    </div>
    <div class="tile">
      <div class="ico"><img src="../assets/asset-36.png" alt=""></div>
      <h3>STI screening &amp; PrEP</h3>
      <p>HIV, syphilis, hepatitis C, gonorrhea, chlamydia — one-stop service.</p>
    </div>
    <div class="tile">
      <div class="ico"><img src="../assets/asset-37.png" alt=""></div>
      <h3>Education access</h3>
      <p>English-language classes and non-formal education routes.</p>
    </div>
  </div>
</body>
</html>

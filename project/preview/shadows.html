<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadows</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 32px 24px; background: var(--paper-2); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box {
    width: 100%; max-width: 130px; height: 80px;
    background: white;
    border-radius: 12px;
  }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow: var(--shadow-sm)"></div><div class="name">--shadow-sm</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-md)"></div><div class="name">--shadow-md</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-lg)"></div><div class="name">--shadow-lg</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-pink); background: var(--swing-pink);"></div><div class="name">--shadow-pink</div></div>
  </div>
</body>
</html>

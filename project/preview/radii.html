<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box {
    width: 96px; height: 80px;
    background: var(--swing-purple-soft);
    border: 1.5px solid var(--swing-purple);
  }
  .pill {
    width: 96px; height: 36px;
    background: var(--swing-pink);
    border-radius: 999px;
    color: white;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    display: flex; align-items: center; justify-content: center;
  }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius: 6px"></div><div class="name">--r-sm</div><div class="px">6px</div></div>
    <div class="item"><div class="box" style="border-radius: 10px"></div><div class="name">--r-md</div><div class="px">10px</div></div>
    <div class="item"><div class="box" style="border-radius: 16px"></div><div class="name">--r-lg</div><div class="px">16px</div></div>
    <div class="item"><div class="box" style="border-radius: 24px"></div><div class="name">--r-xl</div><div class="px">24px</div></div>
    <div class="item"><div class="pill">Pill</div><div class="name">--r-pill</div><div class="px">999px</div></div>
  </div>
</body>
</html>

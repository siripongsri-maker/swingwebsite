<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tags & chips</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }

  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .tag.pink { background: var(--swing-pink-soft); color: var(--swing-pink-deep); }
  .tag.purple { background: var(--swing-purple-soft); color: var(--swing-purple-deep); }
  .tag.outline { background: white; color: var(--swing-purple); box-shadow: inset 0 0 0 1px var(--ink-100); }

  .dot { width: 6px; height: 6px; border-radius: 999px; }
  .pink .dot { background: var(--swing-pink); }
  .purple .dot { background: var(--swing-purple); }
</style>
</head>
<body>
  <div>
    <div class="label">Category chips</div>
    <div class="row">
      <span class="tag pink"><span class="dot"></span>Article</span>
      <span class="tag purple"><span class="dot"></span>News</span>
      <span class="tag outline">Press release</span>
      <span class="tag outline">Health</span>
      <span class="tag outline">Rights</span>
      <span class="tag outline">Education</span>
    </div>
  </div>
  <div style="margin-top:16px">
    <div class="label">Service badges</div>
    <div class="row">
      <span class="tag pink">PrEP</span>
      <span class="tag pink">PEP</span>
      <span class="tag pink">Same-Day ART</span>
      <span class="tag purple">HIV · Syphilis</span>
      <span class="tag purple">Gonorrhea · Chlamydia</span>
      <span class="tag purple">Hormone testing</span>
    </div>
  </div>
</body>
</html>

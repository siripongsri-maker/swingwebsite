<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Display type</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px; }
  .meta { display: flex; gap: 16px; color: var(--fg-3); font-size: 12px; font-family: var(--font-mono); margin-bottom: 10px;}
  h1 { font-family: var(--font-display); font-weight: 700; font-size: 56px; line-height: 1.02; letter-spacing: -0.015em; color: var(--swing-purple-deep); }
  .sub { font-family: var(--font-display); font-weight: 500; font-size: 22px; color: var(--swing-pink); margin-top: 10px; }
  .thai { font-family: var(--font-display); font-weight: 600; font-size: 28px; color: var(--swing-purple); margin-top: 14px; }
</style>
</head>
<body>
  <div class="meta">
    <span>Prompt · Display</span>
    <span>600 / 700</span>
    <span>-1.5% tracking</span>
  </div>
  <h1>Value, dignity, equality.</h1>
  <div class="sub">in different choices and opportunities</div>
  <div class="thai">คุณค่า ศักดิ์ศรี ความเท่าเทียม</div>
</body>
</html>
